services:
  - type: web
    name: glassless-be
    env: python
    plan: free
    rootDir: BE
    buildCommand: pip install -r src/requirements.txt
    startCommand: python -m uvicorn app.main:app --app-dir src --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false

<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>

    <!-- 일반적인 웹사이트 정보 -->
    <title>GlassLESS - 스마트 로컬 여행 가이드</title>
    <meta
      name="description"
      content="GlassLESS와 함께하는 스마트한 현지 여행 가이드. 실시간 날씨와 AI 챗봇 맞춤형 명소 추천을 한눈에 만나보세요."
    />

    <!-- 🌐 Open Graph (카카오톡, 페이스북, 슬랙 공유용 메타 태그) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GlassLESS - 스마트 로컬 여행 가이드" />
    <meta
      property="og:description"
      content="실시간 날씨 기반 코멘트와 AI 챗봇이 제안하는 완벽한 로컬 여행 코스! 지금 확인해보세요."
    />
    <meta property="og:url" content="https://your-domain.com" />
    <!-- ⚠️ 추후 실제 배포할 도메인 주소로 변경해주세요 -->
    <meta property="og:image" content="/images/og-thumbnail.jpg" />
    <!-- ⚠️ 공유 시 보여줄 대표 썸네일 이미지 경로 -->
    <meta property="og:site_name" content="GlassLESS" />
    <meta property="og:locale" content="ko_KR" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
